<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razonne+</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #4E67B1;
            color: #FFFFFF;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #4E67B1 0%, #3d4f8a 100%);
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            color: #BC872E;
            margin-bottom: 10px;
        }

        .logo img {
            max-width: 200px;
            height: auto;
            display: block;
            margin: 0 auto 10px;
        }

        .tagline {
            font-size: 24px;
            color: #BC872E;
            font-weight: 700;
            letter-spacing: 1px;
        }

        nav {
            background-color: #3d4f8a;
            padding: 15px 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav a {
            color: #FFFFFF;
            text-decoration: none;
            margin: 0 20px;
            font-weight: 400;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #BC872E;
        }

        .hero {
            padding: 80px 20px;
            text-align: center;
            background: linear-gradient(180deg, #4E67B1 0%, #3d4f8a 100%);
        }

        .hero h1 {
            font-size: 48px;
            color: #BC872E;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .hero p {
            font-size: 18px;
            color: #FFFFFF;
            margin-bottom: 30px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-button {
            display: inline-block;
            background-color: #BC872E;
            color: #4E67B1;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(188, 135, 46, 0.3);
        }

        .cta-button:hover {
            background-color: #d49a3a;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(188, 135, 46, 0.4);
        }

        .features {
            padding: 60px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .features h2 {
            text-align: center;
            font-size: 36px;
            color: #BC872E;
            font-weight: 700;
            margin-bottom: 50px;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .feature-card {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 10px;
            border-left: 4px solid #BC872E;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .feature-card:hover {
            background-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
        }

        .feature-card h3 {
            color: #BC872E;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .feature-card p {
            color: #FFFFFF;
            font-size: 14px;
        }

        .about {
            padding: 60px 20px;
            background: linear-gradient(180deg, #3d4f8a 0%, #4E67B1 100%);
            max-width: 1200px;
            margin: 0 auto;
        }

        .about h2 {
            font-size: 36px;
            color: #BC872E;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
        }

        .about p {
            color: #FFFFFF;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: justify;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .specs {
            padding: 60px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .specs h2 {
            text-align: center;
            font-size: 36px;
            color: #BC872E;
            font-weight: 700;
            margin-bottom: 50px;
        }

        .specs-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .spec-item {
            background-color: rgba(188, 135, 46, 0.1);
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #BC872E;
            text-align: center;
        }

        .spec-item h3 {
            color: #BC872E;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .spec-item p {
            color: #FFFFFF;
            font-size: 14px;
        }

        .contact {
            padding: 60px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .contact h2 {
            text-align: center;
            font-size: 36px;
            color: #BC872E;
            font-weight: 700;
            margin-bottom: 50px;
        }

        .contact-form {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 10px;
            max-width: 600px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #BC872E;
            font-weight: 700;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #BC872E;
            border-radius: 5px;
            font-family: 'Montserrat', sans-serif;
            background-color: rgba(255, 255, 255, 0.95);
            color: #4E67B1;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            background-color: #FFFFFF;
            box-shadow: 0 0 10px rgba(188, 135, 46, 0.5);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }

        .char-count {
            font-size: 12px;
            color: #BC872E;
            margin-top: 5px;
            text-align: right;
        }

        .required {
            color: #BC872E;
        }

        .submit-btn {
            width: 100%;
            background-color: #BC872E;
            color: #4E67B1;
            padding: 15px;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(188, 135, 46, 0.3);
        }

        .submit-btn:hover {
            background-color: #d49a3a;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(188, 135, 46, 0.4);
        }

        .submit-btn:disabled {
            background-color: #888888;
            cursor: not-allowed;
            transform: none;
        }

        .success-message {
            display: none;
            background-color: rgba(76, 175, 80, 0.2);
            border: 2px solid #4CAF50;
            color: #FFFFFF;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        .success-message.show {
            display: block;
        }

        .error-message {
            display: none;
            background-color: rgba(244, 67, 54, 0.2);
            border: 2px solid #f44336;
            color: #FFFFFF;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        .error-message.show {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        footer {
            background-color: #2d3a66;
            padding: 40px 20px;
            text-align: center;
            border-top: 3px solid #BC872E;
        }

        footer p {
            color: #FFFFFF;
            margin-bottom: 10px;
        }

        footer .social-links {
            margin-top: 20px;
        }

        footer .social-links a {
            color: #BC872E;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        footer .social-links a:hover {
            color: #FFFFFF;
        }

        .emoji {
            font-size: 48px;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 32px;
            }

            nav a {
                display: block;
                margin: 10px 0;
            }

            .features h2,
            .specs h2,
            .about h2,
            .contact h2 {
                font-size: 28px;
            }

            .tagline {
                font-size: 18px;
            }

            .logo img {
                max-width: 150px;
            }

            .contact-form {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="tagline">O Streamly+ está a mudar para Razonne+</div>
    </header>

    <footer>
        <p>&copy; 2026 Razonne+. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
